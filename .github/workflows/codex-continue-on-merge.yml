name: Codex continue after merge

# Authentication model:
#   The `generate-next-patch` job runs the Codex CLI directly (not openai/codex-action)
#   so it can authenticate with a ChatGPT-account credential instead of a metered API key.
#   Provide `CODEX_AUTH_JSON` as a repo secret: the contents of ~/.codex/auth.json from a
#   local `codex login` (with cli_auth_credentials_store = "file"). The credential is written
#   to an ephemeral CODEX_HOME under $RUNNER_TEMP with 600 perms, never logged, and lives
#   outside the repo working tree so it cannot leak into the generated patch.
#   See agent/AUTONOMY.md for the full setup.

on:
  # Continuation now runs locally (terminal watcher + Ruflo + Grok Build). See agent/AUTONOMY.md.
  # Kept as a manual fallback only; no automatic PR generation in CI.
  workflow_dispatch:

concurrency:
  group: codex-continue-after-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-next-patch:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip codex]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODEX_VERSION: "0.141.0"
    outputs:
      has_patch: ${{ steps.diff.outputs.has_patch }}
      final_message: ${{ steps.finalmsg.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prepare Codex output directory
        run: mkdir -p .codex/tmp
      - name: Restore Codex ChatGPT auth
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${CODEX_AUTH_JSON:-}" ]; then
            echo "::error::CODEX_AUTH_JSON secret is not set. Run 'codex login' locally (cli_auth_credentials_store = \"file\") and add ~/.codex/auth.json as the CODEX_AUTH_JSON repo secret. See agent/AUTONOMY.md."
            exit 1
          fi
          CODEX_HOME="$RUNNER_TEMP/codex-home"
          echo "CODEX_HOME=$CODEX_HOME" >> "$GITHUB_ENV"
          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"
          printf '%s' "$CODEX_AUTH_JSON" > "$CODEX_HOME/auth.json"
          chmod 600 "$CODEX_HOME/auth.json"
          if ! jq empty "$CODEX_HOME/auth.json" >/dev/null 2>&1; then
            echo "::error::CODEX_AUTH_JSON is not valid JSON. Re-copy the full contents of ~/.codex/auth.json into the secret."
            exit 1
          fi
          printf 'cli_auth_credentials_store = "file"\n' > "$CODEX_HOME/config.toml"
      - name: Install Codex CLI
        run: npm install -g "@openai/codex@${CODEX_VERSION}"
      - id: codex
        name: Run Codex continuation
        run: |
          set -euo pipefail
          codex exec \
            --skip-git-repo-check \
            --cd "$GITHUB_WORKSPACE" \
            --output-last-message .codex/tmp/codex-next-plan.md \
            --ephemeral \
            --sandbox workspace-write \
            < .github/codex/prompts/autonomous-continue.md
      - id: finalmsg
        name: Capture Codex final message
        run: |
          {
            echo "final-message<<CODEX_FINAL_EOF"
            if [ -f .codex/tmp/codex-next-plan.md ]; then
              cat .codex/tmp/codex-next-plan.md
            else
              echo "(no final message produced)"
            fi
            echo "CODEX_FINAL_EOF"
          } >> "$GITHUB_OUTPUT"
      - id: diff
        name: Create patch artifact
        run: |
          git add -N .
          git diff --binary HEAD > codex.patch
          if [ -s codex.patch ]; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload patch artifact
        if: steps.diff.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codex-continuation-patch
          path: |
            codex.patch
            .codex/tmp/codex-next-plan.md
          if-no-files-found: error
          retention-days: 7

  open-draft-pr:
    runs-on: ubuntu-latest
    needs: generate-next-patch
    if: needs.generate-next-patch.outputs.has_patch == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.CODEX_GITHUB_TOKEN || github.token }}
      - uses: actions/download-artifact@v4
        with:
          name: codex-continuation-patch
      - name: Apply Codex patch
        run: git apply --index codex.patch
      - name: Open draft pull request
        env:
          GH_TOKEN: ${{ secrets.CODEX_GITHUB_TOKEN || github.token }}
          BASE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          CODEX_FINAL_MESSAGE: ${{ needs.generate-next-patch.outputs.final_message }}
        run: |
          branch="codex/continue-$RUN_ID"
          git config user.name "Arvind Rk"
          git config user.email "arvindsuna10@gmail.com"
          git switch -c "$branch"
          git commit -m "chore: continue Codex work after merge"
          git push origin "$branch"

          {
            echo "Codex generated this draft PR after a merge to \`main\`."
            echo
            echo "Base commit: \`$BASE_SHA\`"
            echo "Workflow run: \`$RUN_ID\`"
            echo
            echo "Human gate: review, verify, and approve before merge. This workflow never merges or deploys."
            echo
            echo "Codex final message:"
            echo
            echo "$CODEX_FINAL_MESSAGE"
          } > pr-body.md

          gh pr create \
            --draft \
            --base main \
            --head "$branch" \
            --title "Codex continuation after merge" \
            --body-file pr-body.md
