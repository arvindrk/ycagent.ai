name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run eval:research-smoke
      - run: npm run eval:search-filter-smoke
      - run: npm run eval:build-filter-sql-smoke
      - run: npm run eval:parse-search-filters-smoke
      - run: npm run eval:merged-filter-smoke
      - run: npm run eval:semantic-search-scenario-smoke
      - run: npm run eval:research-orchestrator-mock-eval
      - run: npm run eval:smoke
